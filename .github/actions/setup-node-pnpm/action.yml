name: Setup Node.js and pnpm dependencies
description: Setup pnpm and Node.js with pnpm cache, then install dependencies

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v6
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: package.json
        cache: 'pnpm'
    - name: Install dependencies
      shell: bash
      run: pnpm ci
