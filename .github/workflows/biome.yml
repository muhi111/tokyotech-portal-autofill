name: Code quality
on:
  pull_request:
jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Run code quality
        uses: ./.github/actions/code-quality

  web-ext-lint:
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node-pnpm
      - name: Build extension
        run: pnpm run build
      - name: Lint extension package
        run: pnpm exec web-ext lint --warnings-as-errors --self-hosted --source-dir .output/firefox-mv3
