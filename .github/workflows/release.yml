name: Release
on:
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Run code quality
        uses: ./.github/actions/code-quality

  determine-version:
    name: Determine Version
    runs-on: ubuntu-latest
    needs: code-quality
    outputs:
      new_release_published: ${{ steps.version.outputs.new_release_published }}
      bump: ${{ steps.version.outputs.bump }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node-pnpm
      - name: Determine Next Version
        id: version
        run: |
          BUMP=$(pnpm exec conventional-recommended-bump --preset conventionalcommits)
          echo "Recommended bump: $BUMP"

          if [ -z "$BUMP" ]; then
            echo "No release needed."
            echo "new_release_published=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "new_release_published=true" >> $GITHUB_OUTPUT
          echo "bump=$BUMP" >> $GITHUB_OUTPUT

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: determine-version
    if: ${{ needs.determine-version.outputs.new_release_published == 'true' }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      BUMP: ${{ needs.determine-version.outputs.bump }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node-pnpm
      - name: Bump Version
        id: version
        run: |
          pnpm version "$BUMP" --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Build and Sign Extension
        env:
          DOTENV_PRIVATE_KEY: ${{ secrets.DOTENV_PRIVATE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          pnpm run build
          pnpm exec dotenvx run --env-file=.env -- pnpm exec web-ext sign --source-dir .output/firefox-mv3 --channel unlisted
          mkdir -p release-artifacts
          mv web-ext-artifacts/*.xpi release-artifacts/tokyotech-portal-autofill-${VERSION}.xpi
          go run scripts/generate_update_json.go -version "${VERSION}" -url "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/tokyotech-portal-autofill-${VERSION}.xpi" -output updates.json
          cp updates.json release-artifacts/tokyotech-portal-autofill-updates.json
      - name: Commit and Push package.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add package.json
          git commit -m "chore(release): ${VERSION} [skip ci]"
          git push
      - name: Create Release and Upload Artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create v${VERSION} --title "v${VERSION}" --generate-notes
          gh release upload v${VERSION} release-artifacts/*

  release-skipped:
    name: Release Skipped
    runs-on: ubuntu-latest
    needs: determine-version
    if: ${{ needs.determine-version.outputs.new_release_published != 'true' }}
    steps:
      - name: No release needed
        run: echo "No release needed."
