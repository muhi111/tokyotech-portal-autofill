name: Code quality
description: Run Biome checks

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        persist-credentials: false
    - name: Setup Biome
      uses: biomejs/setup-biome@v2
      with:
        version: 2.4.11
    - name: Run Biome
      shell: bash
      run: biome ci .
